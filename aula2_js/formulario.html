<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Potências</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-canvas">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="card">
      <div class="badge"><span class="badge-dot"></span> calculadora</div>
      <h1>Potências Numéricas</h1>
      <p class="subtitle">// calcule quadrados e cubos instantaneamente</p>

      <div class="op-tabs" role="tablist">
        <button
          class="op-tab active"
          data-op="quadrado"
          role="tab"
          aria-selected="true"
        >
          <span class="icon">x²</span> Quadrado
        </button>
        <button class="op-tab" data-op="cubo" role="tab" aria-selected="false">
          <span class="icon">x³</span> Cubo
        </button>
      </div>

      <div class="input-wrap">
        <label class="input-label" for="numero">Insira o número</label>
        <input
          class="num-input"
          type="number"
          id="numero"
          placeholder="0"
          autocomplete="off"
        />
        <p class="error-msg" id="errorMsg">
          ⚠ Por favor, insira um número válido.
        </p>
      </div>

      <button class="calc-btn" id="calcBtn">
        <span class="btn-text">
          <span id="btnIcon">⚡</span>
          <span id="btnLabel">Calcular Quadrado</span>
        </span>
      </button>

      <div class="result-panel" id="resultPanel">
        <p class="result-label">Resultado</p>
        <p class="result-expression" id="resultExpression"></p>
        <p class="result-value" id="resultValue"></p>
        <div class="divider" id="historyDivider" style="display: none"></div>
        <p class="history-label" id="historyLabel" style="display: none">
          Histórico
        </p>
        <ul class="history-list" id="historyList"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
